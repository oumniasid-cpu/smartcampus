name: smartcampus
description: "A comprehensive Flutter project for Smart Campus management."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation & State Management
  go_router: ^14.0.0
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  get_it: ^8.0.0

  # Network & Data Storage
  dio: ^5.5.0
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.0
  sqflite: ^2.4.0
  path: ^1.9.1

  # Device Features & Sensors
  local_auth: ^2.3.0
  geolocator: ^13.0.0
  image_picker: ^1.1.0
  permission_handler: ^11.3.1
  flutter_local_notifications: ^18.0.0
  sensors_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Recommended for modern code quality
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  # Add asset or font declarations here if needed